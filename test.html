<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morix Beyond | Luxury Experiences</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-brands/css/uicons-brands.css'>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        
        /* Hidden Scrollbar for sleekness */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Animations */
        .fade-up { animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .modal-open { animation: modalScale 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes modalScale {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Cart Pulse */
        @keyframes pulseCart {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); background-color: #F27D57; color: white;}
            100% { transform: scale(1); }
        }
        .cart-pop { animation: pulseCart 0.3s ease-out; }
    </style>
</head>
<body class="text-gray-800">

    <header class="bg-white/80 backdrop-blur-md shadow-sm sticky top-0 z-[50] py-4 px-6 md:px-12 flex justify-between items-center">
        <h1 class="text-2xl font-black text-[#003C63] tracking-tight">MORIX<span class="text-[#F27D57]">.</span></h1>
        <button class="bg-[#003C63] hover:bg-[#F27D57] text-white px-5 py-2.5 rounded-full font-bold transition-all flex items-center gap-3 shadow-[0_4px_15px_rgba(0,60,99,0.2)]" id="cart-btn">
            <i class="fi fi-rr-shopping-bag pt-0.5"></i>
            <span class="hidden sm:inline">My Booking</span>
            <span id="cart-counter" class="bg-white text-[#003C63] text-[10px] px-2 py-0.5 rounded-full font-black">0</span>
        </button>
    </header>

    <section class="py-16 md:py-24 relative">
        <div class="container mx-auto px-4 md:px-8 max-w-[85rem]">
            
            <div class="flex flex-col lg:flex-row gap-12 items-center mb-16">
                <div class="lg:w-1/2 fade-up">
                    <h2 class="text-4xl md:text-6xl font-black text-[#003C63] mb-6 leading-[1.1] tracking-tight">
                        A world of turquoise waters, rich culture, and <span class="text-transparent bg-clip-text bg-gradient-to-r from-[#F27D57] to-[#e0653d]">unforgettable moments.</span>
                    </h2>
                </div>
                
                <div class="lg:w-1/2 w-full fade-up" style="animation-delay: 0.1s;">
                    <div class="bg-white p-2 rounded-full border border-gray-100 shadow-[0_8px_30px_rgb(0,0,0,0.04)] flex flex-wrap" id="filter-container">
                        <button class="filter-btn active flex-1 px-6 py-4 rounded-full bg-[#003C63] text-white text-sm font-bold shadow-md transition-all" data-filter="all">All</button>
                        <button class="filter-btn flex-1 px-6 py-4 rounded-full bg-transparent text-gray-500 text-sm font-bold hover:text-[#F27D57] transition-all" data-filter="water">Water</button>
                        <button class="filter-btn flex-1 px-6 py-4 rounded-full bg-transparent text-gray-500 text-sm font-bold hover:text-[#F27D57] transition-all" data-filter="culture">Culture</button>
                        <button class="filter-btn flex-1 px-6 py-4 rounded-full bg-transparent text-gray-500 text-sm font-bold hover:text-[#F27D57] transition-all hidden sm:block" data-filter="nature">Nature</button>
                    </div>
                </div>
            </div>

            <div id="experiences-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </div>
    </section>

    <div id="experience-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-0 md:p-6">
        
        <div class="absolute inset-0 bg-[#001E33]/80 backdrop-blur-xl transition-opacity" id="modal-backdrop"></div>

        <div class="bg-[#F8FAFC] w-full h-full md:h-[95vh] max-w-[65rem] md:rounded-[3rem] shadow-2xl relative overflow-hidden flex flex-col" id="modal-card">
            
            <button id="close-modal" class="absolute top-6 right-6 z-50 bg-black/20 backdrop-blur-xl border border-white/20 text-white hover:bg-white hover:text-[#F27D57] w-12 h-12 rounded-full flex items-center justify-center transition-all duration-300 text-xl shadow-2xl">
                <i class="fi fi-rr-cross-small"></i>
            </button>

            <div class="w-full h-full overflow-y-auto no-scrollbar flex flex-col pb-24">
                
                <div class="relative w-full h-[45vh] min-h-[350px] shrink-0 bg-black">
                    <img id="modal-img" src="" class="absolute inset-0 w-full h-full object-cover opacity-90 transition-opacity duration-1000">
                    <div class="absolute inset-0 bg-gradient-to-t from-[#003C63] via-[#003C63]/40 to-transparent opacity-90"></div>
                    
                    <div class="absolute bottom-16 left-8 md:left-12 right-8 text-white z-10">
                        <span id="modal-badge" class="inline-flex items-center gap-2 bg-white/20 backdrop-blur-md text-white text-[10px] font-black uppercase tracking-widest px-4 py-1.5 rounded-full border border-white/20 mb-4 shadow-lg">
                            Category
                        </span>
                        <h3 id="modal-title" class="text-4xl md:text-6xl font-black leading-tight drop-shadow-xl tracking-tight">Title</h3>
                    </div>
                </div>

                <div class="relative flex-1 bg-[#F8FAFC] -mt-10 rounded-t-[3rem] z-20 px-6 md:px-12 pt-10 pb-10">
                    
                    <div class="max-w-4xl mb-12">
                        <p id="modal-desc" class="text-xl md:text-2xl text-[#003C63] leading-relaxed font-medium"></p>
                    </div>

                    <div class="flex items-center gap-4 mb-8">
                        <h4 class="text-[#003C63] font-black uppercase text-sm tracking-widest shrink-0"><i class="fi fi-rr-apps-add text-[#F27D57]"></i> Available Services</h4>
                        <div class="h-px bg-gray-200 flex-grow"></div>
                    </div>

                    <div id="modal-services-list" class="grid grid-cols-1 gap-6"></div>
                    
                </div>
            </div>

            <div id="sticky-package-bar" class="absolute bottom-0 left-0 w-full bg-white/90 backdrop-blur-xl border-t border-gray-200 p-6 px-8 md:px-12 transform translate-y-full transition-transform duration-500 z-50 flex flex-col sm:flex-row items-center justify-between gap-4 shadow-[0_-10px_40px_rgba(0,0,0,0.05)]">
                </div>

        </div>
    </div>

    <script>
        // 1. DATA ENGINE (Your Exact Data)
        const experiencesDB = [
            {
                id: "kendwa", title: "Kendwa Beach", category: "water", badge: "Watersports",
                images: ["https://images.unsplash.com/photo-1590523278191-995cbcda646b?q=80&w=800&auto=format&fit=crop", "https://images.unsplash.com/photo-1544551763-46a013bb70d5?q=80&w=800&auto=format&fit=crop"],
                shortDesc: "Experience Zanzibar’s most popular beach with exciting water activities.",
                mainDesc: "A white-sand paradise with crystal-clear waters and legendary sunsets — the perfect setting for luxury ocean experiences, captured with professional drone photography and videography.",
                originalPrice: 490, packagePrice: 450,
                packageDesc: "Experience everything Kendwa Beach offers in one discounted ultimate package. Including all the packages above Clear Kayak + Jet Car + Jet Ski.",
                services: [
                    { name: "Zanzibar Clear Kayak", icon: "fi fi-rr-water", desc: "Capture unforgettable moments with our Clear Kayak Drone Photoshoot.", 
                      options: [{ name: "15 mins", price: 35 }, { name: "30 mins", price: 65 }, { name: "1 hour", price: 125 }, { name: "Package (15m + Drone)", price: 135 }],
                      includes: ["Posing guidance", "Photo assistance"], excludes: [], transportNote: "" },
                    { name: "Jet Car Experience", icon: "fi fi-rr-ship", desc: "Enjoy a thrilling ride on a luxury jet car while our drone records dynamic aerial shots.", 
                      options: [{ name: "15 mins", price: 110 }, { name: "30 mins", price: 200 }, { name: "Package (15m + Drone)", price: 210 }],
                      includes: ["Posing guidance", "Photo assistance", "Safety briefing"], excludes: [], transportNote: "" },
                    { name: "Jet Ski Adventure", icon: "fi fi-rr-dashboard", desc: "Race across the ocean with powerful drone footage tracking your movement.", 
                      options: [{ name: "15 mins", price: 45 }, { name: "30 mins", price: 85 }, { name: "1 hour", price: 165 }, { name: "Package (15m + Drone)", price: 145 }],
                      includes: ["Posing guidance", "Photo assistance", "Safety training", "Life jacket"], excludes: [], transportNote: "" }
                ]
            },
            {
                id: "safariblue", title: "Island Cruise (Safari Blue)", category: "water", badge: "Cruise",
                images: ["https://images.unsplash.com/photo-1586861635167-e5223aadc9fe?q=80&w=800&auto=format&fit=crop"],
                shortDesc: "Enjoy a full-day island adventure across Zanzibar’s turquoise waters.",
                mainDesc: "Exploring pristine sandbanks, hidden lagoons, and colorful coral reefs. Offering the perfect mix of adventure, nature, and island lifestyle.",
                services: [
                    { name: "Safari Blue Adventure", icon: "fi fi-rr-ship", desc: "Classic ocean experience including swimming, snorkeling, and baobab tree exploration.", 
                      options: [{ name: "Per Person", price: 65 }, { name: "Private Dhow (20 pax)", price: 1200 }],
                      includes: ["Water & Fruits", "BBQ seafood lunch", "Snorkelling tools", "Entry fees", "Guide", "Dhow"], 
                      excludes: ["Tips", "Transport"], transportNote: "Transport to departure point can be arranged separately or through us." }
                ]
            },
            {
                id: "navigator", title: "The Navigator", category: "culture", badge: "Culture",
                images: ["https://images.unsplash.com/photo-1576487248805-cf45f6bcc67f?q=80&w=800&auto=format&fit=crop"],
                shortDesc: "Embark on a guided cultural and island-hopping journey.",
                mainDesc: "Explore Zanzibar’s culture, islands, and local life in one unforgettable day.",
                packagePrice: 165,
                services: [
                    { name: "Prison Island Tour", icon: "fi fi-rr-island", desc: "Discover the famous island sanctuary home to Giant tortoises.", options: [{ name: "Per Person", price: 55 }], includes: ["Guide", "Entry fees", "Boat"], excludes: ["Transport"], transportNote: "Transport to Stone Town departure point must be booked separately or with us." },
                    { name: "Nakupenda Sandbank", icon: "fi fi-rr-sun", desc: "Relax on a pristine white sandbank in the middle of turquoise waters.", options: [{ name: "Per Person", price: 50 }], includes: ["Water & Fruits", "Seafood lunch", "Boat"], excludes: ["Transport"], transportNote: "Transport to Stone Town departure point must be booked separately or via us." },
                    { name: "Stone Town Tour", icon: "fi fi-rr-building", desc: "Walk through Zanzibar’s UNESCO-listed old town.", options: [{ name: "Per Person", price: 30 }], includes: ["Guide", "Entry fees"], excludes: ["Transport"], transportNote: "Travel to Stone Town departure point must be booked separately." },
                    { name: "Forodhani Night Market", icon: "fi fi-rr-moon", desc: "End your day at Zanzibar’s most vibrant night market.", options: [{ name: "Per Person", price: 30 }], includes: ["Guide"], excludes: ["Transport", "Food costs"], transportNote: "Travel to Stone Town departure point must be booked separately." }
                ]
            },
            {
                id: "botanist", title: "The Botanist", category: "nature", badge: "Nature",
                images: ["https://images.unsplash.com/photo-1543051932-6ef9f5f15e51?q=80&w=800&auto=format&fit=crop"],
                shortDesc: "Discover Zanzibar’s natural wonders with spices, forests, and unique caves.",
                mainDesc: "Blending spice culture, wildlife, natural swimming caves, a unique turtle experience, and iconic oceanfront dining.",
                packagePrice: 190,
                services: [
                    { name: "Spice Farm Tour", icon: "fi fi-rr-leaf", desc: "Explore famous spice plantations.", options: [{ name: "Per Person", price: 30 }], includes: ["Guide"], excludes: ["Transport"], transportNote: "Transport to the Spice Farm must be arranged separately." },
                    { name: "Jozani Forest", icon: "fi fi-rr-tree", desc: "Encounter the rare red colobus monkeys.", options: [{ name: "Per Person", price: 50 }], includes: ["Guide", "Entry fees"], excludes: ["Transport"], transportNote: "Transport to Jozani Forest must be arranged separately." },
                    { name: "Maalum Cave", icon: "fi fi-rr-water", desc: "Swim in a crystal-clear underground cave pool.", options: [{ name: "Per Person", price: 30 }], includes: ["Guide", "Entry fees"], excludes: ["Transport"], transportNote: "Transport to Maalum cave must be arranged separately." },
                    { name: "Salaam Cave", icon: "fi fi-rr-water", desc: "Swim alongside sea turtles.", options: [{ name: "Per Person", price: 30 }], includes: ["Guide", "Entry fees"], excludes: ["Transport"], transportNote: "Transport to Salaam Cave must be arranged separately." },
                    { name: "The Rock Restaurant", icon: "fi fi-rr-restaurant", desc: "Enjoy a meal at Zanzibar’s most iconic oceanfront restaurant.", options: [{ name: "Per Person", price: 50 }], includes: ["Guide", "Entry fees"], excludes: ["Transport", "Buffet"], transportNote: "Transport to departure point arranged separately." }
                ]
            },
            {
                id: "romantic", title: "Romantic", category: "couples", badge: "Love",
                images: ["https://images.unsplash.com/photo-1520483601560-389dff434fdf?q=80&w=800&auto=format&fit=crop"],
                shortDesc: "Celebrate love with intimate proposals and sunset experiences.",
                mainDesc: "Celebrate love in breathtaking settings with intimate, luxurious experiences for couples.",
                packagePrice: 3000,
                services: [
                    { name: "Beach Proposal Setup", icon: "fi fi-rr-heart", desc: "A private, tastefully decorated beach setting.", options: [{ name: "Per Couple", price: 1000 }], includes: ["Beach setup", "Decoration", "Photography"], excludes: ["Transport"], transportNote: "Transport to departure point arranged separately." },
                    { name: "Flying Dress Photoshoot", icon: "fi fi-rr-camera", desc: "Capture elegant couple portraits.", options: [{ name: "Per Couple", price: 500 }], includes: ["Dresses", "Posing guidance", "Photography"], excludes: ["Transport"], transportNote: "Transport to departure point arranged separately." },
                    { name: "Sunset Yacht Experience", icon: "fi fi-rr-ship", desc: "Sail into the golden hour aboard a luxury yacht.", options: [{ name: "5 Hour Max", price: 1500 }], includes: ["Drinks", "Buffet", "Music", "Photography"], excludes: ["Transport"], transportNote: "Transport to departure point arranged separately." }
                ]
            }
        ];

        let modalInterval = null;

        // 2. RENDER GRID CARDS (Main Page)
        function renderCards(filter = 'all') {
            const grid = document.getElementById('experiences-grid');
            grid.innerHTML = '';
            
            experiencesDB.forEach(exp => {
                if(filter === 'all' || exp.category === filter) {
                    grid.innerHTML += `
                        <div class="group relative h-[450px] rounded-[2.5rem] overflow-hidden cursor-pointer shadow-[0_8px_30px_rgb(0,0,0,0.06)] hover:shadow-2xl transition-all duration-500" onclick="openModal('${exp.id}')">
                            <img src="${exp.images[0]}" class="absolute inset-0 w-full h-full object-cover transition-transform duration-1000 group-hover:scale-105">
                            <div class="absolute inset-0 bg-gradient-to-t from-[#003C63] via-[#003C63]/20 to-transparent opacity-80 group-hover:opacity-90 transition-opacity"></div>
                            
                            <div class="absolute top-6 left-6">
                                <span class="bg-white/20 backdrop-blur-md text-white text-[10px] font-black uppercase px-4 py-2 rounded-full border border-white/30 shadow-lg">
                                    <i class="fi fi-rr-star text-[#F27D57]"></i> ${exp.badge}
                                </span>
                            </div>
                            
                            <div class="absolute bottom-0 left-0 p-8 w-full transform translate-y-4 group-hover:translate-y-0 transition-transform duration-500">
                                <h3 class="text-3xl font-black text-white mb-2 leading-tight">${exp.title}</h3>
                                <p class="text-white/80 text-sm mb-6 line-clamp-2 font-medium">${exp.shortDesc}</p>
                                <button class="w-full bg-white text-[#003C63] font-black py-4 rounded-2xl hover:bg-[#F27D57] hover:text-white transition-colors flex items-center justify-center gap-2 shadow-xl">
                                    Explore Details <i class="fi fi-rr-arrow-right"></i>
                                </button>
                            </div>
                        </div>
                    `;
                }
            });
        }

        // 3. FILTER UI LOGIC
        const filterBtns = document.querySelectorAll('.filter-btn');
        filterBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                filterBtns.forEach(b => {
                    b.classList.remove('bg-[#003C63]', 'text-white', 'shadow-md');
                    b.classList.add('bg-transparent', 'text-gray-500');
                });
                e.currentTarget.classList.remove('bg-transparent', 'text-gray-500');
                e.currentTarget.classList.add('bg-[#003C63]', 'text-white', 'shadow-md');
                renderCards(e.currentTarget.getAttribute('data-filter'));
            });
        });

        // 4. OPEN LUXURY MODAL
        window.openModal = function(id) {
            const data = experiencesDB.find(x => x.id === id);
            const modal = document.getElementById('experience-modal');
            const modalCard = document.getElementById('modal-card');
            const modalImgEl = document.getElementById('modal-img');
            const stickyBar = document.getElementById('sticky-package-bar');
            
            // Image Slideshow
            modalImgEl.src = data.images[0];
            if (data.images.length > 1) {
                let imgIdx = 0;
                modalInterval = setInterval(() => {
                    modalImgEl.style.opacity = '0.5';
                    setTimeout(() => {
                        imgIdx = (imgIdx + 1) % data.images.length;
                        modalImgEl.src = data.images[imgIdx];
                        modalImgEl.style.opacity = '0.9';
                    }, 500); 
                }, 4000);
            }

            // Text Info
            document.getElementById('modal-title').textContent = data.title;
            document.getElementById('modal-badge').innerHTML = `<i class="fi fi-rr-star text-[#F27D57]"></i> ${data.badge}`;
            document.getElementById('modal-desc').innerHTML = data.mainDesc;

            // GENERATE SERVICES (BENTO BOX STYLE)
            let servicesHTML = '';
            data.services.forEach(srv => {
                
                // PILL-BASED INCLUDES/EXCLUDES (Saves massive vertical space)
                const incHTML = srv.includes.map(i => `<span class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-green-50 text-green-700 border border-green-100 text-[10px] font-bold rounded-full mb-2 mr-2"><i class="fi fi-rr-check"></i> ${i}</span>`).join('');
                const excHTML = srv.excludes.map(i => `<span class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-gray-50 text-gray-500 border border-gray-200 text-[10px] font-bold rounded-full mb-2 mr-2"><i class="fi fi-rr-cross-small"></i> ${i}</span>`).join('');
                
                const safeTitle = data.title.replace(/'/g, "\\'");
                const safeSrvName = srv.name.replace(/'/g, "\\'");
                
                // A LA CARTE MENU PRICING
                const optionsHTML = srv.options.map(opt => `
                    <div onclick="handleBookingClick('${safeTitle}', '${safeSrvName} - ${opt.name}')" 
                         class="group flex items-center justify-between p-4 mb-2 rounded-2xl border border-gray-100 hover:border-[#F27D57] hover:shadow-[0_8px_20px_rgba(242,125,87,0.1)] bg-white cursor-pointer transition-all duration-300">
                        <span class="font-bold text-[#003C63] text-sm">${opt.name}</span>
                        <div class="flex items-center gap-4">
                            <span class="font-black text-[#F27D57] text-lg md:text-xl">$${opt.price}</span>
                            <div class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-gray-50 text-[#003C63] group-hover:bg-[#F27D57] group-hover:text-white flex items-center justify-center transition-all duration-300 transform group-hover:scale-110 shadow-sm">
                                <i class="fi fi-rr-plus text-xs md:text-sm"></i>
                            </div>
                        </div>
                    </div>
                `).join('');

                servicesHTML += `
                    <div class="bg-white rounded-[2rem] p-6 md:p-8 shadow-[0_4px_20px_rgb(0,0,0,0.03)] border border-gray-100">
                        
                        <div class="flex items-center gap-4 mb-4">
                            <div class="w-14 h-14 rounded-[1rem] bg-gradient-to-br from-[#003C63] to-[#001e33] text-[#F27D57] flex items-center justify-center text-2xl shadow-lg shadow-[#003C63]/20 shrink-0">
                                <i class="${srv.icon}"></i>
                            </div>
                            <h5 class="font-black text-[#003C63] text-2xl tracking-tight">${srv.name}</h5>
                        </div>
                        
                        <p class="text-gray-500 text-sm leading-relaxed mb-6 font-medium">${srv.desc}</p>
                        
                        <div class="mb-6">
                            ${incHTML}
                            ${excHTML}
                        </div>

                        ${srv.transportNote ? `
                        <div class="mb-6 bg-blue-50/50 border border-blue-100/50 text-[#003C63] p-4 rounded-xl text-xs font-bold flex items-start gap-3">
                            <i class="fi fi-rr-bus-school text-[#F27D57] text-lg mt-0.5"></i> 
                            <span class="leading-relaxed">${srv.transportNote}</span>
                        </div>` : ''}
                        
                        <div class="bg-[#F8FAFC] p-2 rounded-[1.5rem] border border-gray-100">
                            ${optionsHTML}
                        </div>
                    </div>
                `;
            });

            document.getElementById('modal-services-list').innerHTML = servicesHTML;

            // STICKY BOTTOM CHECKOUT LOGIC
            if (data.services.length > 1 || data.packagePrice) {
                const totalPrice = data.packagePrice;
                const safeTitleAll = data.title.replace(/'/g, "\\'");
                
                let priceDisplay = `<span class="text-3xl md:text-4xl font-black text-[#003C63]">$${totalPrice}</span>`;
                if (data.originalPrice) {
                    priceDisplay = `
                        <div class="flex flex-col items-end">
                            <span class="text-xs line-through text-gray-400 font-bold mb-0.5">Value: $${data.originalPrice}</span>
                            <span class="text-3xl md:text-4xl font-black text-[#F27D57]">$${totalPrice}</span>
                        </div>
                    `;
                }

                stickyBar.innerHTML = `
                    <div>
                        <span class="bg-[#F27D57] text-white text-[9px] font-black uppercase tracking-widest px-2 py-1 rounded mb-1 inline-block">Recommended</span>
                        <h4 class="text-lg md:text-xl font-black text-[#003C63] leading-tight">Ultimate Package</h4>
                    </div>
                    
                    <div class="flex items-center gap-6 w-full sm:w-auto">
                        ${priceDisplay}
                        <button onclick="handleBookingClick('${safeTitleAll}', 'Full Package')" class="flex-1 sm:flex-none bg-[#003C63] hover:bg-[#F27D57] text-white px-8 py-4 rounded-2xl font-black text-sm md:text-base transition-all duration-300 shadow-[0_10px_20px_rgba(0,60,99,0.2)] hover:shadow-[0_10px_20px_rgba(242,125,87,0.3)] flex items-center justify-center gap-2 transform hover:-translate-y-1">
                            Book Package
                        </button>
                    </div>
                `;
                
                // Show sticky bar
                setTimeout(() => stickyBar.classList.remove('translate-y-full'), 300);
            } else {
                // Hide sticky bar if no package exists
                stickyBar.classList.add('translate-y-full');
            }

            // Animate Modal Open
            modal.classList.remove('hidden');
            modalCard.classList.add('modal-open');
            document.body.style.overflow = 'hidden';
        };

        // 5. CLOSE MODAL
        function closeModal() {
            if(modalInterval) clearInterval(modalInterval);
            const modalCard = document.getElementById('modal-card');
            const stickyBar = document.getElementById('sticky-package-bar');
            
            stickyBar.classList.add('translate-y-full');
            modalCard.classList.remove('modal-open');
            modalCard.classList.add('scale-95', 'opacity-0');
            
            setTimeout(() => {
                document.getElementById('experience-modal').classList.add('hidden');
                document.getElementById('modal-img').style.opacity = '0.9'; 
                modalCard.classList.remove('scale-95', 'opacity-0'); // reset for next open
            }, 300);
            document.body.style.overflow = 'auto';
        }
        document.getElementById('close-modal').addEventListener('click', closeModal);
        document.getElementById('modal-backdrop').addEventListener('click', closeModal);

        // 6. CART INTEGRATION
        let bookingCount = 0;
        window.handleBookingClick = function(experience, service) {
            bookingCount++;
            const counter = document.getElementById('cart-counter');
            const btn = document.getElementById('cart-btn');
            
            counter.innerText = bookingCount;
            btn.classList.add('cart-pop');
            setTimeout(() => btn.classList.remove('cart-pop'), 300);

            // High-End Toast
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-8 right-4 md:right-8 bg-white/90 backdrop-blur-xl text-[#003C63] p-4 pr-6 rounded-2xl font-bold shadow-[0_20px_50px_rgba(0,0,0,0.15)] flex items-center gap-4 transform translate-y-20 opacity-0 transition-all duration-500 z-[2000] border border-gray-100';
            toast.innerHTML = `
                <div class="w-10 h-10 rounded-full bg-green-500 text-white flex items-center justify-center shadow-lg shadow-green-500/30">
                    <i class="fi fi-rr-check"></i>
                </div>
                <div>
                    <p class="text-[10px] text-gray-400 uppercase tracking-widest mb-0.5">Added to Booking</p>
                    <p class="text-sm leading-tight">${service}</p>
                </div>
            `;
            document.body.appendChild(toast);

            setTimeout(() => toast.classList.remove('translate-y-20', 'opacity-0'), 10);
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
                setTimeout(() => toast.remove(), 500);
            }, 4000);
        };

        // INITIAL LOAD
        renderCards();
    </script>
</body>
</html>
